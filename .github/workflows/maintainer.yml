# ──────────────────────────────────────────────────────────────────────────────
# Caretaker — thin streaming workflow
# Copy to .github/workflows/maintainer.yml in your repository.
# Generated by: caretaker init-workflow
# Docs: https://github.com/ianlintner/caretaker
# ──────────────────────────────────────────────────────────────────────────────
#
# This workflow does NOT run caretaker on the runner.  It mints an OIDC
# token, asks the caretaker backend to execute the run on its own
# infrastructure, and tails the resulting log stream so the GitHub Actions
# log shows live output. Bug fixes ship in the backend without consumer
# repos updating their workflow YAML.
#
# REQUIREMENTS
# ────────────
# - The caretaker GitHub App must be installed on this repository.
# - The backend at $CARETAKER_BACKEND_URL must be reachable from the runner.
# - No PAT, no LLM keys, no checkout — the backend holds those.
#
# AUTHENTICATION
# ──────────────
# The runner mints a short-lived JWT via GitHub Actions OIDC. The backend
# validates it against GitHub's JWKS, verifies the audience, and
# (optionally) confirms the caretaker App is installed on this repo
# before accepting the run.

name: Caretaker Maintainer

on:
  schedule:
    # Run every 15 minutes (adjust to taste; minimum practical is 5 min).
    # The backend deduplicates concurrent runs per repo via the OIDC
    # natural key (repository_id, run_id, run_attempt).
    - cron: "*/15 * * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (full | pr-only | issue-only | upgrade | security | deps | stale)"
        required: false
        default: "full"

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  issues:
    types:
      - opened
      - labeled
      - reopened

concurrency:
  # Serialise runs on the same ref so the backend doesn't fan out
  # redundant agent work.
  group: caretaker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write     # mint GitHub Actions OIDC JWT for backend auth
  contents: read      # the runner doesn't write — the backend does

jobs:
  caretaker:
    name: Caretaker (${{ github.event_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15  # backend does the heavy lifting; tail is cheap

    env:
      # Required: the only configuration the workflow needs.
      CARETAKER_BACKEND_URL: ${{ vars.CARETAKER_BACKEND_URL }}
      # Optional: override the OIDC audience (default: caretaker-backend).
      CARETAKER_OIDC_AUDIENCE: ${{ vars.CARETAKER_OIDC_AUDIENCE }}

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install caretaker
        run: |
          pip install --upgrade pip
          pip install caretaker

      - name: Stream caretaker run
        run: |
          caretaker stream \
            --mode "${{ github.event.inputs.mode || 'full' }}" \
            --event-type "${{ github.event_name }}"
